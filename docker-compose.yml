services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-questhub_dev}
      POSTGRES_USER: ${POSTGRES_USER:-questhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-questhub_change_me}
    ports:
      - "5434:5432"
    volumes:
      - questhub_db:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.dev
    env_file:
      - .env.development
    environment:
      JWT_SECRET: ${JWT_SECRET:-dev_secret_change_me}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:5173}
      DEV_USER_EMAIL: ${DEV_USER_EMAIL:-dev@questhub.local}
      DEV_USER_PASSWORD: ${DEV_USER_PASSWORD:-dev}
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${PORT:-3001}
      DATABASE_URL: postgresql://${POSTGRES_USER:-questhub}:${POSTGRES_PASSWORD:-questhub_change_me}@db:5432/${POSTGRES_DB:-questhub_dev}?schema=public
    ports:
      - "3001:3001"
    depends_on:
      - db
    volumes:
      - ./:/repo
      - questhub_node_modules:/repo/node_modules
    command: ["npm", "run", "dev:api"]

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      # Para o browser acessar a API publicada no host
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./:/repo
      - questhub_node_modules:/repo/node_modules
    command: ["npm", "run", "dev:web", "--", "--host", "0.0.0.0", "--port", "5173"]

volumes:
  questhub_db:
  questhub_node_modules:

